<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title></title>
</head>
<body>
  <div id="app">
  <h1>ダブルクリックでリセット</h1>

  <p>現在の値：{{ count }}</p>

  <button @click="count++">
    ＋1
  </button>

  <button @dblclick="count = 0">
    ダブルクリックでリセット
  </button>
</div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
