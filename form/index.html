<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title></title>
</head>
<body>
 <div id="app">
	<h1>お問い合わせフォーム</h1>
	
	<p>
	  <input
	    type="text"
	    placeholder="名前"
	    @focus="focusInput"
	    @blur="blurInput"
	    @input="countText"
	  >
	</p>
	
	<p class="message">{{ message }}</p>
	
	<p class="count">
	  入力文字数：{{ length }}
	</p>
	
	<button @click="submitForm">
	  送信
	</button>
</div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
